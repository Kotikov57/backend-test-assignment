services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: withdrawals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  api:
    build: .
    depends_on:
      - postgres
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/withdrawals?sslmode=disable
      AUTH_TOKEN: test-token
    ports:
      - "8080:8080"

volumes:
  pgdata:
